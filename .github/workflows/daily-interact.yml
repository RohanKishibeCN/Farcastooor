name: Farcaster AI Daily Interact

on:
  schedule:
    # 每天 UTC 时间 02:00 和 12:00 触发 (北京时间 10:00 和 20:00)
    - cron: '0 2,12 * * *'
  workflow_dispatch:

jobs:
  run-interact:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Interact Script
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          NEYNAR_API_KEY_1: ${{ secrets.NEYNAR_API_KEY_1 }}
          NEYNAR_API_KEY_2: ${{ secrets.NEYNAR_API_KEY_2 }}
          SIGNER_UUID_A: ${{ secrets.SIGNER_UUID_A }}
          SIGNER_UUID_B: ${{ secrets.SIGNER_UUID_B }}
          SIGNER_UUID_C: ${{ secrets.SIGNER_UUID_C }}
          SIGNER_UUID_D: ${{ secrets.SIGNER_UUID_D }}
        run: npm run interact

      - name: Commit and Push Report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add report.md state.json
          git commit -m "docs: update interact report [skip ci]" || echo "No changes to commit"
          git pull --rebase
          git push

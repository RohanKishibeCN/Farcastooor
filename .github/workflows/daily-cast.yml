name: Farcaster AI Daily Cast

on:
  schedule:
    # 每 3 天的 UTC 时间 06:00 触发 (北京时间 14:00)
    - cron: '0 6 */3 * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击按钮触发测试

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 允许最长运行时间（包含我们的休眠时间）
    permissions:
      contents: write # 允许 Action 将战报 push 回仓库

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run AI Fleet Script
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          NEYNAR_API_KEY_1: ${{ secrets.NEYNAR_API_KEY_1 }}
          NEYNAR_API_KEY_2: ${{ secrets.NEYNAR_API_KEY_2 }}
          SIGNER_UUID_A: ${{ secrets.SIGNER_UUID_A }}
          SIGNER_UUID_B: ${{ secrets.SIGNER_UUID_B }}
          SIGNER_UUID_C: ${{ secrets.SIGNER_UUID_C }}
          SIGNER_UUID_D: ${{ secrets.SIGNER_UUID_D }}
        run: npm start

      - name: Commit and Push Report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add report.md state.json
          git commit -m "docs: update daily report and state [skip ci]" || echo "No changes to commit"
          git pull --rebase
          git push
